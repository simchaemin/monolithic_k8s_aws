server:
  forward-headers-strategy: framework
  port: 8888

spring:
  # profile settings
  #   config:
  #     activate:
  #       on-profile: dev

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      # create, create-drop, update, none
      ddl-auto: create
      # 콘솔출력
    show-sql: true
    properties:
      hibernate:
        # h2
        # dialect: org.hibernate.dialect.H2Dialect
        # mariadb
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # redis
  # docker run -d --name redis-container -p 6379:6379 redis:7.2
  # docker exec -it redis-container redis-cli
  # ping
  # docker run -d --name redis-insight -p 8001:5540 redis/redisinsight:latest
  # http://localhost:8001
  # Host: redis 또는 host.docker.internal , port: 6379

  data:
    redis:
      host: redis-service
      port: 6379
      password:
      timeout: 6000ms

# mybatis settings
# mybatis:
#     mapper-locations: /mappers/**/*Mapper.xml
#     config-location:  classpath:/mappers/config/mybatis-config.xml

jwt:
  secret: jslim-super-secret-key-for-jwt-123456789
