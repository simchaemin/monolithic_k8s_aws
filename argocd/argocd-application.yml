apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-application
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/simchaemin/monolithic_k8s_aws.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: lgcns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
