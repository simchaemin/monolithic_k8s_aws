name: deploy order

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # https://docs.github.com/ko/actions
    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-2

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region us-west-2 --name lgcns-simchaemin-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: image build and push docker image to ecr
        env:
          REGISTRY: 310095858382.dkr.ecr.us-west-2.amazonaws.com
          REPOSITORY: order-simchaemin-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: kubectl apply
        run: |
          kubectl apply -f k8s/order_redis.yml
          kubectl apply -f k8s/order_deployment.yml
          kubectl rollout restart deployment order-deployment
